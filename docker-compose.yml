services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: claw
      POSTGRES_PASSWORD: claw
      POSTGRES_DB: claw
    ports:
      - "5442:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claw"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
